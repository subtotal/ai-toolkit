name: CI

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  typescript-build:
    name: Build - TypeScript
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./typescript

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.11.0

      - name: Node
        uses: actions/setup-node@v6
        with:
          node-version: "18"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Clean
        run: pnpm run clean

      - name: Lint
        run: pnpm run lint

      - name: Prettier
        run: pnpm run prettier-check

      - name: Test
        run: pnpm run test

  modelcontextprotocol-build:
    name: Build - Model Context Protocol
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./modelcontextprotocol

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.11.0

      - name: Node
        uses: actions/setup-node@v6
        with:
          node-version: "18"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Clean
        run: pnpm run clean

      - name: Lint
        run: pnpm run lint

      - name: Prettier
        run: pnpm run prettier-check

      - name: Test
        run: pnpm run test
  
  python-build:
    name: Build - Python
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./python

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      
      - name: Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python3.11 -m venv --clear venv
          touch requirements.txt
          make venv
      
      - name: Check Linting
        run: make check-lint
      
      - name: Check Formatting
        run: make check-format
      
      - name: Run Tests
        run: make test
      
      - name: Build Package
        run: |
          set -x
          make clean
          make build
          make check-build

  notify-failure:
    needs: [typescript-build, modelcontextprotocol-build, python-build]
    permissions: {}
    if: ${{ failure() && github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack
        env:
          SLACK_CI_WEBHOOK_URL: ${{ secrets.SLACK_CI_WEBHOOK_URL }}
        run: |
          if [[ -z "${SLACK_CI_WEBHOOK_URL:-}" ]]; then
            echo "SLACK_CI_WEBHOOK_URL not set; skipping notify"
            exit 0
          fi
          short_sha="${GITHUB_SHA:0:7}"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          commit_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}"
          jq -n \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg workflow "$GITHUB_WORKFLOW" \
            --arg branch "$GITHUB_REF_NAME" \
            --arg actor "$GITHUB_ACTOR" \
            --arg short_sha "$short_sha" \
            --arg commit_url "$commit_url" \
            --arg run_url "$run_url" \
            '{text: (":rotating_light: *" + $repo + "* — workflow `" + $workflow + "` failed on `" + $branch + "`\nCommit: <" + $commit_url + "|`" + $short_sha + "`> by " + $actor + "\nRun: <" + $run_url + "|view logs>")}' \
            | curl -sS -X POST -H 'Content-Type: application/json' --data @- "$SLACK_CI_WEBHOOK_URL" >/dev/null \
            || echo "WARNING: Slack post failed" >&2
